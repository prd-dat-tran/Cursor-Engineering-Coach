name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Open the extension...
        2. Navigate to...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Extension Version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: input
    id: cursor-version
    attributes:
      label: Cursor Version
      description: From Cursor → Settings → About
      placeholder: e.g. 1.5.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. macOS 15, Windows 11, Ubuntu 24.04
    validations:
      required: false
